<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=800"/>
<title>Pokédex</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Exo+2:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:800px;height:480px;overflow:hidden;background:#cc0000;font-family:'Exo 2',sans-serif}

/* ── OUTER SHELL ── */
.pokedex{
  width:800px;height:480px;
  background:#cc0000;
  display:grid;
  grid-template-columns:310px 1fr;
  position:relative;
  border:4px solid #880000;
}

/* camera / indicator lights top-left */
.top-deco{
  position:absolute;top:10px;left:12px;
  display:flex;align-items:center;gap:8px;z-index:10;
}
.camera{
  width:28px;height:28px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#6af,#0044cc);
  border:3px solid #000;
  box-shadow:0 0 0 2px #444;
}
.lights{display:flex;gap:5px;align-items:center}
.dot{width:10px;height:10px;border-radius:50%;border:2px solid #000}
.dot.r{background:#ff2200}
.dot.y{background:#ffcc00}
.dot.g{background:#00cc44}

/* hinge line between panels */
.hinge{
  position:absolute;top:0;bottom:0;left:310px;
  width:6px;background:#880000;z-index:5;
  border-left:2px solid #660000;border-right:2px solid #660000;
}

/* ── LEFT PANEL ── */
.left{
  background:#cc0000;
  padding:52px 16px 16px 16px;
  display:flex;flex-direction:column;
  align-items:center;gap:10px;
  position:relative;
}

/* big screen bezel */
.screen-bezel{
  width:242px;
  background:#111;
  border:4px solid #000;
  border-radius:6px;
  padding:6px;
  box-shadow:inset 0 2px 8px #000, 0 4px 0 #770000;
  position:relative;
}
.screen-inner{
  background:#e8f5e8;
  border:2px solid #333;
  border-radius:3px;
  width:100%;height:190px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  overflow:hidden;
}
/* scanline overlay for retro feel */
.screen-inner::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);
  pointer-events:none;z-index:2;
}
#poke-img{width:160px;height:160px;object-fit:contain;position:relative;z-index:1}

/* screen corner triangles */
.screen-bezel::before,.screen-bezel::after{
  content:'';position:absolute;
  border:10px solid transparent;
}
.screen-bezel::before{top:-2px;left:-2px;border-top-color:#880000;border-left-color:#880000}
.screen-bezel::after{bottom:-2px;right:-2px;border-bottom-color:#880000;border-right-color:#880000}

/* small indicator below screen */
.screen-light{
  width:10px;height:10px;border-radius:50%;
  background:#00ff44;border:2px solid #000;
  box-shadow:0 0 6px #00ff44;
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
}

.types-row{display:flex;gap:6px;margin-top:2px}
.tpill{
  font-family:'Orbitron',monospace;
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:5px 12px;border:2.5px solid #000;border-radius:2px;
  color:#fff;
}

/* number + genus on left panel */
.left-meta{display:flex;justify-content:space-between;width:100%;padding:0 4px}
.meta-txt{
  font-family:'Share Tech Mono',monospace;
  font-size:13px;font-weight:700;color:#ffee00;
  text-shadow:1px 1px 0 #000;
  letter-spacing:1px;
}

/* ── RIGHT PANEL ── */
.right{
  background:#1a1a1a;
  padding:14px 18px 12px 20px;
  display:flex;flex-direction:column;
  justify-content:space-between;
  margin-left:6px;
}

/* right panel top screws */
.screw{
  position:absolute;width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#999,#444);
  border:1.5px solid #222;
}

.name-bar{
  border-bottom:2px solid #cc0000;
  padding-bottom:8px;margin-bottom:10px;
}
#poke-name{
  font-family:'Orbitron',monospace;
  font-size:34px;font-weight:900;
  text-transform:uppercase;color:#fff;
  line-height:1;letter-spacing:1px;
  text-shadow:2px 2px 0 #880000;
}
.entry-label{
  font-family:'Share Tech Mono',monospace;
  font-size:11px;color:#cc0000;letter-spacing:3px;
  text-transform:uppercase;margin-top:3px;
}

/* desc box styled like a data readout */
.desc-box{
  background:#0a0a0a;
  border:2px solid #cc0000;
  border-radius:3px;
  padding:9px 12px;
  position:relative;
}
.desc-box::before{
  content:'DATA';
  position:absolute;top:-9px;left:10px;
  background:#0a0a0a;
  font-family:'Share Tech Mono',monospace;
  font-size:9px;color:#cc0000;letter-spacing:2px;padding:0 4px;
}
#poke-desc{
  font-family:'Exo 2',sans-serif;
  font-size:14px;line-height:1.6;color:#eee;font-weight:700;
  overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:3;-webkit-box-orient:vertical;
}

/* stats */
.stats-wrap{display:flex;flex-direction:column;gap:5px}
.stats-label{
  font-family:'Share Tech Mono',monospace;
  font-size:10px;color:#cc0000;letter-spacing:3px;text-transform:uppercase;
}
.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.stat-col{display:flex;flex-direction:column;align-items:center;gap:3px}
.stat-bar-vert{
  width:20px;height:44px;
  background:#111;border:2px solid #444;border-radius:2px;
  overflow:hidden;display:flex;align-items:flex-end;
}
.stat-fill{width:100%}
.stat-num{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;color:#fff}
.stat-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:#888;text-transform:uppercase;text-align:center}

/* info + date row */
.bottom-row{display:flex;justify-content:space-between;align-items:flex-end}
.info-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{
  border:2px solid #cc0000;border-radius:2px;
  padding:4px 10px;
  font-family:'Share Tech Mono',monospace;
  font-size:12px;font-weight:700;color:#fff;background:#000;
}
.date-line{
  font-family:'Share Tech Mono',monospace;
  font-size:11px;color:#555;letter-spacing:1px;text-transform:uppercase;
  text-align:right;
}

/* d-pad decoration bottom-left of left panel */
.dpad-wrap{
  position:absolute;bottom:14px;left:16px;
}
.dpad{
  width:48px;height:48px;position:relative;
}
.dpad-h,.dpad-v{
  position:absolute;background:#000;border:2px solid #444;border-radius:2px;
}
.dpad-h{top:33%;left:0;right:0;height:34%}
.dpad-v{left:33%;top:0;bottom:0;width:34%}
.dpad-center{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:14px;height:14px;background:#222;border-radius:50%;
  border:2px solid #444;
}

/* A/B buttons bottom-right of left panel */
.buttons-wrap{
  position:absolute;bottom:18px;right:18px;
  display:grid;grid-template-columns:1fr 1fr;gap:6px;
}
.btn-circle{
  width:22px;height:22px;border-radius:50%;
  border:2.5px solid #000;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:9px;font-weight:900;color:#fff;
}
</style>
</head>
<body>
<div class="pokedex">

  <!-- top decoration -->
  <div class="top-deco">
    <div class="camera"></div>
    <div class="lights">
      <div class="dot r"></div>
      <div class="dot y"></div>
      <div class="dot g"></div>
    </div>
  </div>

  <!-- hinge -->
  <div class="hinge"></div>

  <!-- LEFT PANEL -->
  <div class="left">
    <div class="left-meta">
      <span class="meta-txt" id="num-stamp">#001</span>
      <span class="meta-txt" id="genus-tag" style="font-size:11px;max-width:130px;text-align:right"></span>
    </div>

    <div class="screen-bezel">
      <div class="screen-inner">
        <img id="poke-img" src="" alt=""/>
      </div>
      <div class="screen-light"></div>
    </div>

    <div class="types-row" id="types-row"></div>

    <!-- d-pad -->
    <div class="dpad-wrap">
      <div class="dpad">
        <div class="dpad-h"></div>
        <div class="dpad-v"></div>
        <div class="dpad-center"></div>
      </div>
    </div>

    <!-- A/B buttons -->
    <div class="buttons-wrap">
      <div class="btn-circle" style="background:#0044cc">A</div>
      <div class="btn-circle" style="background:#cc0000">B</div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <div class="name-bar">
      <div id="poke-name">—</div>
      <div class="entry-label">Pokédex Entry</div>
    </div>

    <div class="desc-box">
      <p id="poke-desc">—</p>
    </div>

    <div class="stats-wrap">
      <div class="stats-label">Base Stats</div>
      <div class="stats-grid" id="stats-grid"></div>
    </div>

    <div class="bottom-row">
      <div class="info-row" id="info-row"></div>
      <div class="date-line" id="date-line"></div>
    </div>
  </div>

</div>

<script>
const SL={hp:'HP',attack:'ATK',defense:'DEF','special-attack':'SpA','special-defense':'SpD',speed:'SPD'};
const SC={hp:'#ff2200',attack:'#ff6600',defense:'#0066ff','special-attack':'#aa00ff','special-defense':'#00cc44',speed:'#00ccee'};
const TYPE_COLORS={
  fire:'#dd2200',water:'#0055dd',grass:'#227700',electric:'#cc8800',
  psychic:'#cc0055',ice:'#0099bb',dragon:'#3300cc',dark:'#111111',
  fairy:'#bb0077',normal:'#556655',fighting:'#bb0000',flying:'#2244aa',
  poison:'#7700aa',ground:'#996600',rock:'#776600',bug:'#446600',
  ghost:'#440077',steel:'#334455',unknown:'#333333'
};

const id=Math.floor(Math.random()*1010)+1;
async function load(){
  try{
    const[pr,sr]=await Promise.all([
      fetch('https://pokeapi.co/api/v2/pokemon/'+id).then(r=>r.json()),
      fetch('https://pokeapi.co/api/v2/pokemon-species/'+id).then(r=>r.json())
    ]);
    document.getElementById('poke-name').textContent=pr.name;
    document.getElementById('num-stamp').textContent='#'+String(pr.id).padStart(3,'0');
    const g=(sr.genera||[]).find(g=>g.language.name==='en');
    document.getElementById('genus-tag').textContent=g?g.genus:'';
    document.getElementById('poke-img').src=pr.sprites?.other?.['official-artwork']?.front_default||pr.sprites?.front_default||'';

    document.getElementById('types-row').innerHTML=pr.types.map(t=>{
      const c=TYPE_COLORS[t.type.name]||'#333';
      return '<div class="tpill" style="background:'+c+'">'+t.type.name+'</div>';
    }).join('');

    const en=(sr.flavor_text_entries||[]).filter(e=>e.language.name==='en');
    const pk=en[Math.floor(Math.random()*Math.min(en.length,6))];
    document.getElementById('poke-desc').textContent=pk?pk.flavor_text.replace(/[\f\n\r]/g,' '):'No entry found.';

    document.getElementById('stats-grid').innerHTML=pr.stats.map(s=>{
      const p=Math.min(100,Math.round((s.base_stat/255)*100));
      return '<div class="stat-col"><div class="stat-bar-vert"><div class="stat-fill" style="height:'+p+'%;background:'+(SC[s.stat.name]||'#fff')+'"></div></div><div class="stat-num">'+s.base_stat+'</div><div class="stat-lbl">'+(SL[s.stat.name]||s.stat.name)+'</div></div>';
    }).join('');

    const gen=(sr.generation?.name||'').replace('generation-','Gen ').toUpperCase();
    document.getElementById('info-row').innerHTML=
      '<div class="chip">'+(pr.height/10).toFixed(1)+'m</div>'+
      '<div class="chip">'+(pr.weight/10).toFixed(1)+'kg</div>'+
      '<div class="chip">'+(gen||'—')+'</div>'+
      '<div class="chip">'+(sr.habitat?.name||'Unknown')+'</div>';
    document.getElementById('date-line').textContent=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }catch(e){
    document.getElementById('poke-name').textContent='ERROR';
    document.getElementById('poke-desc').textContent='Could not load data. Check connection.';
  }
}
load();
</script>
</body>
</html>
