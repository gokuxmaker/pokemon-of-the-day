<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=800"/>
<title>Pokédex</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=DM+Sans:wght@800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:800px;height:480px;overflow:hidden;background:#fff;color:#000;font-family:'DM Sans',sans-serif}
body{display:grid;grid-template-columns:260px 1fr}

.left{
  background:#fff;
  border-right:3px solid #000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:16px;gap:12px;position:relative;
}
.number-stamp{
  position:absolute;top:12px;left:14px;
  font-size:18px;font-weight:900;color:#000;letter-spacing:1px;
}
.genus-tag{
  position:absolute;top:12px;right:12px;
  font-size:14px;font-weight:900;color:#000;
  text-transform:uppercase;letter-spacing:1px;
  text-align:right;max-width:120px;
}
.img-wrap{width:190px;height:190px;display:flex;align-items:center;justify-content:center}
#poke-img{width:180px;height:180px;object-fit:contain}
.types-row{display:flex;gap:8px}
.tpill{
  font-size:14px;font-weight:900;letter-spacing:2px;text-transform:uppercase;
  padding:6px 16px;border:2.5px solid #000;border-radius:2px;
  color:#000;background:#fff;
}

.right{
  background:#fff;
  padding:18px 24px 16px 22px;
  display:flex;flex-direction:column;
  justify-content:space-between;
}
.top-bar{
  border-bottom:3px solid #000;
  padding-bottom:10px;margin-bottom:12px;
  display:flex;align-items:flex-end;justify-content:space-between;
}
#poke-name{
  font-family:'Playfair Display',serif;
  font-size:52px;font-weight:900;
  text-transform:capitalize;color:#000;line-height:1;
}
.entry-label{
  font-size:14px;font-weight:900;letter-spacing:2px;
  text-transform:uppercase;color:#000;padding-bottom:4px;
}
#poke-desc{
  font-size:18px;line-height:1.65;color:#000;font-weight:900;
  border-left:5px solid #000;padding-left:14px;
  overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
}

.stats-title{
  font-size:13px;font-weight:900;letter-spacing:3px;
  text-transform:uppercase;color:#000;margin-bottom:8px;
}
.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.stat-col{display:flex;flex-direction:column;align-items:center;gap:3px}
.stat-bar-vert{
  width:18px;height:50px;background:#fff;
  border:2.5px solid #000;border-radius:3px;
  overflow:hidden;display:flex;align-items:flex-end;
}
.stat-fill{width:100%}
.stat-num{font-size:15px;font-weight:900;color:#000}
.stat-lbl{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.5px;color:#000;text-align:center}

.info-row{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  border:2.5px solid #000;border-radius:2px;
  padding:6px 13px;
  font-size:14px;font-weight:900;color:#000;background:#fff;
}
.date-line{
  font-size:13px;font-weight:900;letter-spacing:1.5px;
  text-transform:uppercase;color:#000;text-align:right;
}
</style>
</head>
<body>
<div class="left">
  <span class="number-stamp" id="num-stamp">#001</span>
  <span class="genus-tag" id="genus-tag"></span>
  <div class="img-wrap">
    <img id="poke-img" src="" alt=""/>
  </div>
  <div class="types-row" id="types-row"></div>
</div>
<div class="right">
  <div>
    <div class="top-bar">
      <div id="poke-name">—</div>
      <div class="entry-label">Pokédex Entry</div>
    </div>
    <p id="poke-desc">—</p>
  </div>
  <div>
    <div class="stats-title">Base Stats</div>
    <div class="stats-grid" id="stats-grid"></div>
  </div>
  <div class="info-row" id="info-row"></div>
  <div class="date-line" id="date-line"></div>
</div>
<script>
const SL={hp:'HP',attack:'ATK',defense:'DEF','special-attack':'SpA','special-defense':'SpD',speed:'SPD'};

/* High-contrast colours that pop on e-ink but still read against white */
const SC={
  hp:'#cc0000',
  attack:'#e65c00',
  defense:'#0055cc',
  'special-attack':'#7700cc',
  'special-defense':'#007a33',
  speed:'#007b9e'
};

const TYPE_COLORS={
  fire:{bg:'#e63000',text:'#fff'},
  water:{bg:'#0055cc',text:'#fff'},
  grass:{bg:'#2d8a00',text:'#fff'},
  electric:{bg:'#cc9900',text:'#000'},
  psychic:{bg:'#cc0055',text:'#fff'},
  ice:{bg:'#0099aa',text:'#fff'},
  dragon:{bg:'#3333bb',text:'#fff'},
  dark:{bg:'#222222',text:'#fff'},
  fairy:{bg:'#bb0066',text:'#fff'},
  normal:{bg:'#666655',text:'#fff'},
  fighting:{bg:'#aa0000',text:'#fff'},
  flying:{bg:'#2255aa',text:'#fff'},
  poison:{bg:'#7700aa',text:'#fff'},
  ground:{bg:'#aa6600',text:'#fff'},
  rock:{bg:'#886600',text:'#fff'},
  bug:{bg:'#557700',text:'#fff'},
  ghost:{bg:'#440088',text:'#fff'},
  steel:{bg:'#445566',text:'#fff'},
  unknown:{bg:'#333',text:'#fff'}
};

const id=Math.floor(Math.random()*1010)+1;
async function load(){
  try{
    const[pr,sr]=await Promise.all([
      fetch('https://pokeapi.co/api/v2/pokemon/'+id).then(r=>r.json()),
      fetch('https://pokeapi.co/api/v2/pokemon-species/'+id).then(r=>r.json())
    ]);
    document.getElementById('poke-name').textContent=pr.name;
    document.getElementById('num-stamp').textContent='#'+String(pr.id).padStart(3,'0');
    const g=(sr.genera||[]).find(g=>g.language.name==='en');
    document.getElementById('genus-tag').textContent=g?g.genus:'';

    /* Colour image — no greyscale filter */
    document.getElementById('poke-img').src=pr.sprites?.other?.['official-artwork']?.front_default||pr.sprites?.front_default||'';

    /* Type pills with high-contrast colour fills + black border */
    document.getElementById('types-row').innerHTML=pr.types.map(t=>{
      const c=TYPE_COLORS[t.type.name]||TYPE_COLORS.unknown;
      return '<div class="tpill" style="background:'+c.bg+';color:'+c.text+';border-color:#000">'+t.type.name+'</div>';
    }).join('');

    const en=(sr.flavor_text_entries||[]).filter(e=>e.language.name==='en');
    const pk=en[Math.floor(Math.random()*Math.min(en.length,6))];
    document.getElementById('poke-desc').textContent=pk?pk.flavor_text.replace(/[\f\n\r]/g,' '):'No entry found.';

    /* Stat bars with colour fills, black border retained */
    document.getElementById('stats-grid').innerHTML=pr.stats.map(s=>{
      const p=Math.min(100,Math.round((s.base_stat/255)*100));
      const col=SC[s.stat.name]||'#000';
      return '<div class="stat-col"><div class="stat-bar-vert"><div class="stat-fill" style="height:'+p+'%;background:'+col+'"></div></div><div class="stat-num">'+s.base_stat+'</div><div class="stat-lbl">'+(SL[s.stat.name]||s.stat.name)+'</div></div>';
    }).join('');

    const gen=(sr.generation?.name||'').replace('generation-','Gen ').toUpperCase();
    document.getElementById('info-row').innerHTML=
      '<div class="chip">'+(pr.height/10).toFixed(1)+'m</div>'+
      '<div class="chip">'+(pr.weight/10).toFixed(1)+'kg</div>'+
      '<div class="chip">'+(gen||'—')+'</div>'+
      '<div class="chip">'+(sr.habitat?.name||'Unknown habitat')+'</div>';
    document.getElementById('date-line').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
  }catch(e){
    document.getElementById('poke-name').textContent='Error';
    document.getElementById('poke-desc').textContent='Could not load data. Check connection.';
  }
}
load();
</script>
</body>
</html>
